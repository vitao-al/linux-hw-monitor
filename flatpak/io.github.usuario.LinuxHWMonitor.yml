app-id: io.github.usuario.LinuxHWMonitor
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: linux-hw-monitor

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=/sys/class/hwmon:ro
  - --filesystem=/sys/class/thermal:ro
  - --filesystem=/sys/class/power_supply:ro
  - --filesystem=/sys/class/net:ro
  - --filesystem=/sys/class/drm:ro
  - --filesystem=/sys/block:ro
  - --filesystem=/sys/devices:ro
  - --filesystem=/proc/stat:ro
  - --filesystem=/proc/meminfo:ro
  - --filesystem=/proc/net/dev:ro
  - --filesystem=/proc/diskstats:ro
  - --filesystem=/proc/cpuinfo:ro
  - --talk-name=org.freedesktop.UPower
  - --system-talk-name=org.freedesktop.hostname1

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/linux-hw-monitor/cargo
    RUST_BACKTRACE: '1'

modules:
  - name: linux-hw-monitor
    buildsystem: meson
    config-opts:
      - -Dprofile=release
    sources:
      - type: dir
        path: ..
